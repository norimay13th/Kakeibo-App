<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#007AFF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="家計簿">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<title>資産推移</title>
<style>
  header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  #signin-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 14px;
    padding: 4px 0;
    white-space: nowrap;
  }
</style>
</head>
<body>

<header>
  <div style="flex:1">
    <h1>資産推移</h1>
    <nav class="segmented">
      <a href="index.html">支出</a>
      <a href="trend.html" class="active">資産推移</a>
    </nav>
  </div>
  <button id="signin-btn" type="button">サインイン</button>
</header>

<main>
  <select id="year-select" class="picker"></select>

  <div id="warning-banner"></div>

  <div class="hero-card">
    <div class="label">純資産額</div>
    <div class="value" id="hero-networth">—</div>
  </div>

  <div class="chart-card">
    <h2>収入金額</h2>
    <canvas id="chart-income"></canvas>
  </div>
  <div class="chart-card">
    <h2>支出金額</h2>
    <canvas id="chart-expense"></canvas>
  </div>
  <div class="chart-card">
    <h2>貯金額</h2>
    <canvas id="chart-savings"></canvas>
  </div>
  <div class="chart-card">
    <h2>借金+ローン額</h2>
    <canvas id="chart-liabilities"></canvas>
  </div>
  <div class="chart-card">
    <h2>資産額</h2>
    <canvas id="chart-assets"></canvas>
  </div>

  <div class="chart-card">
    <h2>保有資産割合</h2>
    <canvas id="chart-allocation"></canvas>
  </div>
</main>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="config.js"></script>
<script src="sheets.js"></script>
<script src="parser.js"></script>
<script src="aggregate.js"></script>
<script src="trend.js"></script>
</body>
</html>
