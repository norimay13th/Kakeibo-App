<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#007AFF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="家計簿">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<title>家計簿</title>
</head>
<body>

<header>
  <h1>Kakeibo-App</h1>
  <nav class="segmented">
    <a href="index.html" class="active">家計簿</a>
    <a href="trend.html">資産推移</a>
  </nav>
</header>

<main>
  <select id="month-select" class="picker"></select>

  <div id="warning-banner"></div>

  <div class="stat-grid">
    <div class="stat-card" data-detail="income" role="button" tabindex="0">
      <div class="label">収入</div>
      <div class="value" id="stat-income">—</div>
    </div>
    <div class="stat-card" data-detail="expense" role="button" tabindex="0">
      <div class="label">支出</div>
      <div class="value" id="stat-expense">—</div>
    </div>
    <div class="stat-card">
      <div class="label">貯金額</div>
      <div class="value" id="stat-savings">—</div>
    </div>
    <div class="stat-card">
      <div class="label">純資産額</div>
      <div class="value" id="stat-networth">—</div>
    </div>
    <div class="stat-card" data-detail="assets" role="button" tabindex="0">
      <div class="label">資産額</div>
      <div class="value" id="stat-assets">—</div>
    </div>
    <div class="stat-card" data-detail="liabilities" role="button" tabindex="0">
      <div class="label">負債額</div>
      <div class="value" id="stat-liabilities">—</div>
    </div>
  </div>

  <div id="pace-insight" class="insight-banner"></div>

  <div class="chart-card">
    <h2>総支出 割合</h2>
    <div class="chart-wrap chart-wrap--donut">
      <canvas id="chart-category"></canvas>
    </div>
    <ul class="legend-list" id="category-legend"></ul>
  </div>

  <div class="chart-card">
    <h2>変動支出 先月比較</h2>
    <div class="chart-row">
      <div class="chart-wrap">
        <canvas id="chart-variable-total-compare"></canvas>
      </div>
      <div class="chart-wrap">
        <canvas id="chart-category-compare"></canvas>
      </div>
    </div>
    <table class="compare" id="category-compare-table">
      <thead>
        <tr><th>項目</th><th>今月</th><th>先月</th><th>差額</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="chart-card">
    <h2>先月比較</h2>
    <table class="compare" id="compare-table">
      <thead>
        <tr><th>項目</th><th>今月</th><th>先月</th><th>差額</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="chart-card">
    <h2 id="title-fixed-costs">固定費：—</h2>
    <div id="fixed-cost-table"></div>
  </div>

  <div class="chart-card">
    <h2 id="title-kakeibo-detail">変動支出：—</h2>
    <table class="itemized" id="kakeibo-detail-table">
      <thead>
        <tr><th>カテゴリー</th><th>用途</th><th>金額</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</main>

<div id="detail-modal" class="modal-backdrop">
  <div class="modal-sheet" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <button id="modal-close" type="button" aria-label="閉じる">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="slice-labels.js"></script>
<script src="modal.js"></script>
<script src="config.js"></script>
<script src="sheets.js"></script>
<script src="parser.js"></script>
<script src="aggregate.js"></script>
<script src="index.js"></script>
</body>
</html>
