<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#007AFF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="家計簿">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<title>家計簿</title>
</head>
<body>

<header>
  <h1>家計簿</h1>
  <nav class="segmented">
    <a href="index.html" class="active">家計簿</a>
    <a href="trend.html">資産推移</a>
  </nav>
</header>

<main>
  <select id="month-select" class="picker"></select>

  <div id="warning-banner"></div>

  <div class="stat-grid">
    <div class="stat-card">
      <div class="label">今月の収入</div>
      <div class="value" id="stat-income">—</div>
    </div>
    <div class="stat-card">
      <div class="label">今月の支出</div>
      <div class="value" id="stat-expense">—</div>
    </div>
    <div class="stat-card">
      <div class="label">今月の貯金額</div>
      <div class="value" id="stat-savings">—</div>
    </div>
    <div class="stat-card">
      <div class="label">今月の純資産額</div>
      <div class="value" id="stat-networth">—</div>
    </div>
    <div class="stat-card">
      <div class="label">今月の資産額</div>
      <div class="value" id="stat-assets">—</div>
    </div>
    <div class="stat-card">
      <div class="label">借金+ローン額</div>
      <div class="value" id="stat-liabilities">—</div>
    </div>
  </div>

  <div class="chart-card">
    <h2>カテゴリー別支出</h2>
    <div class="chart-wrap">
      <canvas id="chart-category"></canvas>
    </div>
  </div>

  <div class="chart-card">
    <h2>先月比較</h2>
    <table class="compare" id="compare-table">
      <thead>
        <tr><th>項目</th><th>今月</th><th>先月</th><th>差額</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2/dist/chartjs-plugin-datalabels.min.js"></script>
<script src="config.js"></script>
<script src="sheets.js"></script>
<script src="parser.js"></script>
<script src="aggregate.js"></script>
<script src="index.js"></script>
</body>
</html>
